<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grocers | Recipe Price Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loader { display: none; margin: 20px 0; }
        #results-section { display: none; }
        .recipe-card img { height: 200px; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <div id="search-view">
        <div class="text-center mb-5">
            <h1>Search Recipes</h1>
            <div class="input-group mb-3" style="max-width: 600px; margin: 0 auto;">
                <input type="text" id="mealInput" class="form-control" placeholder="Tacos, Spaghetti, etc.">
                <button id="cookBtn" class="btn btn-primary">Find Recipes</button>
            </div>

            <div id="loader" class="loader text-center">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2">Loading data...</p>
            </div>
        </div>
        
        <div id="recipe-options" class="row row-cols-1 row-cols-md-3 g-4 mb-5"></div>
    </div>

    <div id="results-section">
        <button class="btn btn-outline-secondary mb-3" onclick="location.reload()">← Back to Search</button>
        
        <h3 id="recipe-title">Ingredients</h3>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Icon</th>
                    <th>Ingredient</th>
                    <th>Qty</th>
                    <th>Unit</th>
                </tr>
            </thead>
            <tbody id="data-table"></tbody> 
        </table>
        <button id="comparePricesBtn" class="btn btn-primary btn-lg" > Compare prices around you</button>
    </div>
    <div id="ComparePricesSection" style="display:none;">
    
    <div id="smart-summary" class="row mb-4"> </div>
        <h3>Store Comparisons</h3>
        <div id="comparison-cards-container" class="row row-cols-1 row-cols-md-2 g-4"></div>
    </div>
</div>

<script>
    // Connect JS to HTML
    const cookBtn = document.getElementById('cookBtn');
    const mealInput = document.getElementById('mealInput');
    const loader = document.getElementById('loader');
    const resultsSection = document.getElementById('results-section');
    const recipeOptions = document.getElementById('recipe-options');
    const tableBody = document.getElementById('data-table');
    const recipeTitle = document.getElementById('recipe-title');
    const searchView = document.getElementById('search-view');

    const comparePricesBtn = document.getElementById('comparePricesBtn');

    // State to hold recipe info and ingredients
    const recipeState = {
        ingredients: [], // Starts empty
        recipeName: "",  // You can add more info here later
        totalCost: 0
    };
    

    // Search for recipes
    cookBtn.addEventListener('click', () => {
        const meal = mealInput.value.trim();
        if(!meal) return alert("Please enter a meal name");
        recipeState.recipeName = meal; // Save the meal name to state

        loader.style.display = 'block';
        recipeOptions.innerHTML = ''; // Clear old cards

        fetch('http://127.0.0.1:5000/search-recipes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ meal: meal })
        })
        .then(res => res.json())
        .then(recipes => {
            loader.style.display = 'none';
            displayRecipeOptions(recipes);
        })
        .catch(err => {
            loader.style.display = 'none';
            alert("Check if Python is running!");
        });
    });

    // Display cards
    function displayRecipeOptions(recipes) {
        recipeOptions.innerHTML = '';
        if(recipes.length === 0) return alert("No recipes found.");

        recipes.forEach(r => {
            recipeOptions.innerHTML += `
                <div class="col">
                    <div class="card h-100 recipe-card shadow-sm">
                        <img src="${r.image}" class="card-img-top" alt="${r.title}">
                        <div class="card-body">
                            <h5 class="card-title">${r.title}</h5>
                            <button class="btn btn-success w-100" onclick="startScraping(${r.id}, '${r.title.replace(/'/g, "\\'")}')">
                                Select This Recipe
                            </button>
                        </div>
                    </div>
                </div>`;
        });
    }

    // Get ingredients for the chosen recipe
    function startScraping(id, title) {
        searchView.style.display = 'none';
        loader.style.display = 'block';
        loader.scrollIntoView();
        
        recipeTitle.innerText = `Ingredients for: ${title}`;

        fetch('http://127.0.0.1:5000/get-meal-info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, title: title })
        })
        .then(res => res.json())
        .then(data => {
            loader.style.display = 'none';
            resultsSection.style.display = 'block';
            displayData(data);
        });
    }

    // Fill the table with ingredient data 
    function displayData(data) {
        tableBody.innerHTML = '';
        recipeState.ingredients = data.ingredients || [];
        
        recipeState.ingredients.forEach(item => {
            const baseUrl = "https://spoonacular.com/cdn/ingredients_100x100/";
            
            tableBody.innerHTML += `
                <tr>
                    <td><img src="${baseUrl + item.image}" style="width: 40px;"></td>
                    <td class="text-capitalize fw-bold">${item.name}</td>
                    <td>${item.amount.us.value}</td>
                    <td class="text-muted">${item.amount.us.unit}</td>
                </tr>
            `;
        });

    }
    comparePricesBtn.addEventListener('click', async () => {
        document.getElementById('results-section').style.display = 'none';
        document.getElementById('ComparePricesSection').style.display = 'block';
        console.log("Button clicked! Length is:", recipeState.ingredients.length);
        for (let i = 0; i < recipeState.ingredients.length; i++) {
            console.log(recipeState.ingredients[i].name);
        }
        const dataToSend = {
            ingredients: recipeState.ingredients,
            name: recipeState.recipeName
        };
        const response = await fetch('http://127.0.0.1:5000/compare-ingredient', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' // Tells Python "Hey, this is JSON!"
         },
            body: JSON.stringify(dataToSend) // Converts object to a string
        });
        const result = await response.json();
        console.log("Python sent this back:", result);


    });
    
</script>
</body>
</html>
