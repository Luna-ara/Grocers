<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <title>Grocers | Recipe Price Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div id="global-loader" class="loader-overlay" style="display: none;">
    <div class="loader-box text-center shadow">
        <div class="spinner-border text-primary" role="status"></div>
        <p id="global-loader-text" class="mt-2 mb-0 fw-bold">Loading...</p>
    </div>
</div>

<div class="container">
    <div id="search-view">
        <div class="text-center mb-5">
            <h1>Search Recipes</h1>
            <div class="input-group mb-3" style="max-width: 600px; margin: 0 auto;">
                <input type="text" id="mealInput" class="form-control" placeholder="Tacos, Spaghetti, etc.">
                <button id="cookBtn" class="btn btn-primary">Find Recipes</button>
            </div>
        </div>
        
        <div id="recipe-options" class="row row-cols-1 row-cols-md-3 g-4 mb-5"></div>
    </div>

    <div id="results-section">
        <button class="btn btn-outline-secondary mb-3" onclick="location.reload()">← Back to Search</button>
        
        <h3 id="recipe-title">Ingredients</h3>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Icon</th>
                    <th>Ingredient</th>
                    <th>Qty</th>
                    <th>Unit</th>
                </tr>
            </thead>
            <tbody id="data-table"></tbody> 
        </table>
        <button id="comparePricesBtn" class="btn btn-primary btn-lg" > Compare prices around you</button>
    </div>
    <div id="ComparePricesSection" style="display:none;">
    
    <div id="smart-summary" class="row mb-4"> </div>
        <h3>Store Comparisons</h3>
        <label for="zipcodeInput">Enter your zipcode:</label>
        <div class="input-group mb-3" style="max-width: 400px;">
            <input type="text" id="zipcodeInput" class="form-control" placeholder="e.g. 90290">
            <button id="runComparisonBtn" class="btn btn-success">Search Stores</button>
            
        </div>
    </div>
    <div id="comparison-results" style="display: flex; gap: 20px; margin-top: 20px;"></div>

</div>

<script>
    // Connect JS to HTML
    const cookBtn = document.getElementById('cookBtn');
    const mealInput = document.getElementById('mealInput');
    const resultsSection = document.getElementById('results-section');
    const recipeOptions = document.getElementById('recipe-options');
    const tableBody = document.getElementById('data-table');
    const recipeTitle = document.getElementById('recipe-title');
    const searchView = document.getElementById('search-view');

    const comparePricesBtn = document.getElementById('comparePricesBtn');
    const runComparisonBtn = document.getElementById('runComparisonBtn');
    const globalLoader = document.getElementById('global-loader');
    const globalLoaderText = document.getElementById('global-loader-text');


    // State to hold recipe info and ingredients
    const recipeState = {
        ingredients: [], // Starts empty
        recipeName: "",  // You can add more info here later
        totalCost: 0
    };

    function showLoader(message = "Loading...") {
        globalLoaderText.innerText = message;
        globalLoader.style.display = 'flex'; 
    }
    function hideLoader() {
        globalLoader.style.display = 'none';
    }


    // Search for recipes
    cookBtn.addEventListener('click', () => {
        const meal = mealInput.value.trim();
        if(!meal) return alert("Please enter a meal name");
        recipeState.recipeName = meal; // Save the meal name to state
        recipeOptions.innerHTML = ''; // Clear old cards

        fetch('http://127.0.0.1:5000/search-recipes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ meal: meal })
        })
        .then(res => res.json())
        .then(recipes => {
            displayRecipeOptions(recipes);
        })
        .catch(err => {
            alert("Check if Python is running!");
        });
    });

    // Display cards
    function displayRecipeOptions(recipes) {
        recipeOptions.innerHTML = '';
        if(recipes.length === 0) return alert("No recipes found.");

        recipes.forEach(r => {
            recipeOptions.innerHTML += `
                <div class="col">
                    <div class="card h-100 recipe-card shadow-sm">
                        <img src="${r.image}" class="card-img-top" alt="${r.title}">
                        <div class="card-body">
                            <h5 class="card-title">${r.title}</h5>
                            <button class="btn btn-success w-100" onclick="startScraping(${r.id}, '${r.title.replace(/'/g, "\\'")}')">
                                Select This Recipe
                            </button>
                        </div>
                    </div>
                </div>`;
        });
    }

    // Get ingredients for the chosen recipe
    function startScraping(id, title) {
        searchView.style.display = 'none';
        
        recipeTitle.innerText = `Ingredients for: ${title}`;

        fetch('http://127.0.0.1:5000/get-meal-info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, title: title })
        })
        .then(res => res.json())
        .then(data => {
            resultsSection.style.display = 'block';
            displayData(data);
        });
    }

    // Fill the table with ingredient data 
    function displayData(data) {
        tableBody.innerHTML = '';
        recipeState.ingredients = data.ingredients || [];
        
        recipeState.ingredients.forEach(item => {
            const baseUrl = "https://spoonacular.com/cdn/ingredients_100x100/";
            
            tableBody.innerHTML += `
                <tr>
                    <td><img src="${baseUrl + item.image}" style="width: 40px;"></td>
                    <td class="text-capitalize fw-bold">${item.name}</td>
                    <td>${item.amount.us.value}</td>
                    <td class="text-muted">${item.amount.us.unit}</td>
                </tr>
            `;
        });

    }
    comparePricesBtn.addEventListener('click', () => {
        document.getElementById('results-section').style.display = 'none';
        document.getElementById('ComparePricesSection').style.display = 'block';
    });
    runComparisonBtn.addEventListener('click', async () => {
        showLoader("Searching for recipes...");
        const zipcode = zipcodeInput.value.trim();
        if (!zipcode) {
            return alert("Please enter a zip code first!");
        }
        for (let i = 0; i < recipeState.ingredients.length; i++) {
            console.log(recipeState.ingredients[i].name);
        }
        const dataToSend = {
            ingredients: recipeState.ingredients,
            name: recipeState.recipeName
        };
        const response = await fetch('http://127.0.0.1:5000/compare-ingredient', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' 
         },
            body: JSON.stringify(dataToSend) // Converts object to string
        });
        hideLoader();
        const result = await response.json();
        console.log("Python sent this back:", result);

        // Target the container in your HTML
        const resultsContainer = document.getElementById('comparison-results');
        resultsContainer.innerHTML = ''; // Clear out any previous results

        // 1. Build Target Card
        let targetHTML = `
            <div class="store-card" style="border: 2px solid #CC0000; padding: 20px; border-radius: 10px; flex: 1;">
                <h2 style="color: #CC0000;">Target</h2>
                <h3>Total: $${result.target.total.toFixed(2)}</h3>
                <hr>
                <ul style="list-style-type: none; padding: 0;">
        `;
        
        // Loop through Target items
        result.target.items.forEach(item => {
            targetHTML += `
                <li style="margin-bottom: 10px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
                    <strong>${item.name}</strong><br>
                    <small>${item.brand}</small> - <strong>$${item.price.toFixed(2)}</strong>
                </li>
            `;
        });
        targetHTML += `</ul></div>`;

        // 2. Build Kroger Card
        let krogerHTML = `
            <div class="store-card" style="border: 2px solid #0054A6; padding: 20px; border-radius: 10px; flex: 1;">
                <h2 style="color: #0054A6;">Kroger</h2>
                <h3>Total: $${result.kroger.total.toFixed(2)}</h3>
                <hr>
                <ul style="list-style-type: none; padding: 0;">
        `;
        
        // Loop through Kroger items
        result.kroger.items.forEach(item => {
            krogerHTML += `
                <li style="margin-bottom: 10px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
                    <strong>${item.name}</strong><br>
                    <small>${item.brand}</small> - <strong>$${item.price.toFixed(2)}</strong>
                </li>
            `;
        });
        krogerHTML += `</ul></div>`;

        // 3. Inject both cards into the screen
        resultsContainer.innerHTML = targetHTML + krogerHTML;


    });
    
    
</script>
</body>
</html>
